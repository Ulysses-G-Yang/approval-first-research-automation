name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall -q extract_prices.py agent.py core adapters research_assistant workflows scripts labs
      - run: python -m unittest discover -s tests -v

  installed-package:
    name: installed-package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Install the built wheel
        shell: python
        run: |
          import glob
          import subprocess
          import sys

          wheels = glob.glob("dist/*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found: {wheels}")
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheels[0]])
      - run: python -m pip check
      - name: Smoke test the installed distribution outside the checkout
        working-directory: ${{ runner.temp }}
        run: python "${{ github.workspace }}/scripts/package_smoke.py"
