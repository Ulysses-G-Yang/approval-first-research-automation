version: 1
name: file_report
summary: "本地文件报告：$task.goal"
requires:
  - input_files
steps:
  - id: read_files
    for_each: input_files
    tool: file.read
    description: "读取已明确提供的文件：$item"
    arguments:
      path: "$item"
  - id: normalize
    tool: data.normalize
    description: "去重并整理已批准来源"
    arguments: {}
  - id: summarize
    when: provider_configured
    tool: report.summarize
    description: "将已批准数据发送给已配置模型生成摘要"
    arguments: {}
  - id: report
    tool: report.compose
    description: "生成带来源清单的 Markdown 报告"
    arguments: {}
